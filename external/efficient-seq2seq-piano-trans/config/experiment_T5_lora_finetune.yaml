defaults:
  - experiment_T5_V4_HierarchyPool
  - _self_

model:
  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: ["projection", "output", "query", "key", "value"]
  checkpoint_type: merged
  strict_checkpoint: true
  checkpoint_ignore_layres: []

training:
  notes: "T5_lora_finetune_batch=32_enc_unfroze"
  learning_rate: 2e-4
  training_steps: 5001
  evaluate_every_n_steps: 1000
  cal_metrics_every_n_steps: 25
  checking_steps: 1000
  online_testing: false
  log_hrm_scale_metrics: false
  lora_train_layer_norm: true
  lora_train_output_head: false
