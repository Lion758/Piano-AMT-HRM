model:
  # LoRA / PEFT defaults
  use_lora: false
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: ["projection", "output", "query", "key", "value", "encoder_decoder_attention"]
  checkpoint_type: auto  # auto | full | lora | merged

training:
  # Extra trainable parameters when LoRA is enabled
  lora_train_layer_norm: false
  lora_train_output_head: false


  use_hrm_refiner: true
  hrm_H_cycles: 2
  hrm_L_cycles: 2
  hrm_H_layers: 4
  hrm_L_layers: 4
  hrm_num_heads: 8
  hrm_expansion: 4.0
  hrm_rms_norm_eps: 1e-5
  hrm_use_rope: true
  hrm_forward_dtype: torch.bfloat16

  # Baseline setting keeps fixed single-step refinement.
  hrm_halt_max_steps: 1
  hrm_halt_exploration_prob: 0.0
  hrm_use_act_halt: false
  use_recording_id_embedding: false

  # Experiment profiles for fixed-vs-adaptive depth ablations.
  hrm_experiment_profiles:
    fixed_step:
      hrm_use_act_halt: false
      hrm_halt_max_steps: 1
    adaptive_step:
      hrm_use_act_halt: true
      hrm_halt_max_steps: 3
  hrm_cross_scale_coupling: false
  hrm_cross_scale_bidirectional: true
  hrm_aux_token_loss: false
  hrm_aux_token_loss_shared_head: true
  hrm_aux_token_loss_weight: 0.1
  hrm_ablation_pooling_sets: []
  hrm_auto_reset_on_batch_start: true
  hrm_auto_reset_on_eval: false

  # initial freeze
  freeze_encoder_init: true
  freeze_decoder_init: true
  freeze_hrm_init: true

  # phase boundaries (set to null to disable)
  unfreeze_decoder_step: 500
  unfreeze_encoder_step: 1800
  unfreeze_hrm_step: 800

  # lr warmup (steps)
  hrm_lr_warmup_steps: 500

  # per-module learning rates
  lr_hrm: 1.0e-4
  lr_decoder: 1.0e-4
  lr_encoder: 1.0e-4

  # ACT halting auxiliary losses (used only when model.hrm_use_act_halt=true)
  hrm_q_halt_loss_weight: 0.5
  hrm_q_continue_loss_weight: 0.5